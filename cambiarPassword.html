<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>BuddyFinder: Cambiar contraseña</title>
    <link rel="icon" href="./recursos/img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="css/estilos.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/default.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/alertify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/login.js"></script>
    <script src="js/cambiarPassword.js"></script>
    
  </head>

  <body onload="comprobarLogin()">
    <nav>
      <ul class="menu">
        <li><a href="panel.html">Volver al panel principal</a></li>
      </ul>
    </nav>
    
    <div class="login-container">
      <h2>Cambiar contraseña</h2>

      <input type="password" id="passwordNueva" placeholder="Nueva contraseña" />
      <input type="password" id="passwordRepetida" placeholder="Repetir contraseña" />
      <button onclick="cambiarPassword()">Guardar</button>
      <p id="mensajeError"></p>
    </div>
  </body>
</html>
